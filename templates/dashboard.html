{% extends "layout.html" %}
{% block content %}
<h2>User Dashboard</h2>

<a href="/request-reset" class="btn btn-warning mb-3">Request Password Reset</a>
<a href="/logout" class="btn btn-danger">Logout</a>

<table class="table mt-3">
<tr>
    <th>ID</th>
    <th>Status</th>
    <th>Date</th>
</tr>

{% for r in requests %}
<tr>
    <td>{{ r.id }}</td>
    <td>
        {{ r.status }}
        {% if r.status == "Approved" %}
            <a href="/user-reset/{{ r.id }}" class="btn btn-primary btn-sm">Set New Password</a>
        {% endif %}
    </td>
    <td>{{ r.request_date }}</td>
</tr>
{% endfor %}
</table>
{% endblock %}
